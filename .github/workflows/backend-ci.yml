name: Backend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'python_engine/**'
      - 'pyproject.toml'
      - 'Dockerfile'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'python_engine/**'
      - 'pyproject.toml'

env:
  PYTHON_VERSION: '3.11'

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy detect-secrets
          
      - name: Run Ruff (linter)
        run: ruff check python_engine/
        
      - name: Run Ruff (formatter check)
        run: ruff format --check python_engine/
        
      - name: Run mypy (type checker)
        run: mypy python_engine/ --ignore-missing-imports
        
      - name: Run detect-secrets
        run: detect-secrets scan python_engine/ --baseline .secrets.baseline

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    
    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_USER: hedge_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: hedge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "python_engine[dev]"
          
      - name: Run tests with coverage
        working-directory: python_engine
        env:
          DATABASE_URL: postgresql+asyncpg://hedge_user:test_password@localhost:5432/hedge_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test_secret_key_do_not_use_in_production
          N8N_WEBHOOK_SECRET: test-n8n-secret-ci-only
          ENVIRONMENT: testing
        run: |
          alembic upgrade head
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            -v
            
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: python_engine/coverage.xml
          flags: backend
          name: backend-coverage

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Run Bandit (security linter)
        run: |
          pip install bandit
          bandit -r python_engine/ -ll
          
      - name: Run Safety (dependency vulnerability check)
        run: |
          pip install safety
          safety check --json || true

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != ''
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: python_engine
          file: python_engine/Dockerfile.prod
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/fuel-hedging-api:latest
            ${{ secrets.DOCKER_USERNAME }}/fuel-hedging-api:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/fuel-hedging-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/fuel-hedging-api:buildcache,mode=max

  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Trigger Render deployment
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          
      - name: Wait for deployment
        run: sleep 60
        
      - name: Health check
        run: |
          for i in {1..10}; do
            if curl -f ${{ secrets.RENDER_API_URL }}/healthz; then
              echo "✅ Deployment successful"
              exit 0
            fi
            echo "Waiting for service to be ready..."
            sleep 10
          done
          echo "❌ Deployment health check failed"
          exit 1

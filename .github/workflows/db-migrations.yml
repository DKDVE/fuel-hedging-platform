name: Database Migrations

on:
  push:
    branches: [main, develop]
    paths:
      - 'python_engine/alembic/**'
      - 'python_engine/app/db/models.py'
      - '.github/workflows/db-migrations.yml'
  pull_request:
    branches: [main]
    paths:
      - 'python_engine/alembic/**'

env:
  PYTHON_VERSION: '3.11'

jobs:
  validate-migrations:
    name: Validate Migration Files
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "python_engine[dev]"
          
      - name: Check migration history
        working-directory: ./python_engine
        run: |
          alembic history --verbose
          alembic check
          
      - name: Validate migration syntax
        working-directory: ./python_engine
        run: |
          python -m py_compile alembic/versions/*.py

  test-migration-up:
    name: Test Migration (Up)
    runs-on: ubuntu-latest
    needs: validate-migrations
    
    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_USER: migrate_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: hedge_migrate_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "python_engine[dev]"
          
      - name: Run migrations (upgrade to head)
        working-directory: ./python_engine
        env:
          DATABASE_URL: postgresql+asyncpg://migrate_test:test_password@localhost:5432/hedge_migrate_test
        run: |
          alembic upgrade head
          
      - name: Verify tables created
        env:
          PGPASSWORD: test_password
        run: |
          psql -h localhost -U migrate_test -d hedge_migrate_test -c "\dt" | grep -E "users|platform_config|price_ticks|analytics_runs|hedge_recommendations|approvals|hedge_positions|audit_logs"

  test-migration-down:
    name: Test Migration (Down)
    runs-on: ubuntu-latest
    needs: test-migration-up
    
    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_USER: migrate_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: hedge_migrate_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "python_engine[dev]"
          
      - name: Run migrations (up then down)
        working-directory: ./python_engine
        env:
          DATABASE_URL: postgresql+asyncpg://migrate_test:test_password@localhost:5432/hedge_migrate_test
        run: |
          alembic upgrade head
          alembic downgrade -1
          alembic upgrade head

  deploy-migrations-staging:
    name: Deploy to Staging DB
    runs-on: ubuntu-latest
    needs: [test-migration-up, test-migration-down]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "python_engine[dev]"
          
      - name: Run migrations on staging
        working-directory: ./python_engine
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          alembic upgrade head
          
      - name: Create backup point
        run: |
          echo "Migration applied to staging at $(date)" >> migration_log.txt

  deploy-migrations-production:
    name: Deploy to Production DB
    runs-on: ubuntu-latest
    needs: [test-migration-up, test-migration-down]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    environment:
      name: production
      url: https://fuel-hedging-api.onrender.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "python_engine[dev]"
          
      - name: Backup production database
        run: |
          echo "Creating backup before migration..."
          # Add your backup command here (e.g., pg_dump to S3)
          
      - name: Run migrations on production
        working-directory: ./python_engine
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: |
          alembic upgrade head
          
      - name: Verify migration success
        working-directory: ./python_engine
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: |
          alembic current
          
      - name: Notify team on failure
        if: failure()
        run: |
          echo "❌ Production migration failed - manual intervention required"
          # Add notification webhook (Slack, email, etc.)

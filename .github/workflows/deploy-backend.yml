name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "python_engine/**"
      - "models/**"
      - "data/**"
      - "render.yaml"

  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual deploy"
        required: true

jobs:
  wait-for-ci:
    name: Wait for CI to pass
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI workflow
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: "Security Scan"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 20

  migrate:
    name: Run Migrations
    runs-on: ubuntu-latest
    needs: wait-for-ci

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: python_engine/requirements.txt

      - name: Install dependencies
        working-directory: python_engine
        run: pip install -r requirements.txt -r requirements-core.txt -r requirements-analytics.txt 2>/dev/null || pip install -r requirements.txt

      - name: Check migration safety (schema drift detection)
        working-directory: python_engine
        env:
          DATABASE_URL: ${{ secrets.RENDER_DATABASE_URL }}
          SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          N8N_WEBHOOK_SECRET: ${{ secrets.N8N_WEBHOOK_SECRET }}
          ENVIRONMENT: production
        run: |
          echo "Checking for unapplied migrations..."
          alembic check 2>&1 || true
          echo "Migration check complete."

      - name: Apply migrations
        working-directory: python_engine
        env:
          DATABASE_URL: ${{ secrets.RENDER_DATABASE_URL }}
          SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          N8N_WEBHOOK_SECRET: ${{ secrets.N8N_WEBHOOK_SECRET }}
          ENVIRONMENT: production
        run: |
          echo "Applying migrations..."
          alembic upgrade head
          echo "Migrations complete."

  deploy-api:
    name: Deploy API to Render
    runs-on: ubuntu-latest
    needs: migrate

    steps:
      - name: Trigger Render deploy — hedge-api
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_API }}")
          if [ "$RESPONSE" != "201" ]; then
            echo "Deploy hook returned HTTP $RESPONSE (expected 201)"
            exit 1
          fi
          echo "Deploy triggered successfully (HTTP $RESPONSE)"

      - name: Poll health check until deployment completes
        run: |
          echo "Waiting for deployment to complete..."
          MAX_ATTEMPTS=30
          ATTEMPT=0
          SLEEP_SECONDS=20

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Health check attempt $ATTEMPT/$MAX_ATTEMPTS..."

            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 \
              https://hedge-api.onrender.com/health 2>/dev/null || echo "000")

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✓ API is healthy (HTTP 200)"
              exit 0
            fi

            echo "  Status: $HTTP_STATUS — waiting ${SLEEP_SECONDS}s..."
            sleep $SLEEP_SECONDS
          done

          echo "FAILED: API did not become healthy within $((MAX_ATTEMPTS * SLEEP_SECONDS))s"
          exit 1

  deploy-n8n:
    name: Deploy n8n to Render
    runs-on: ubuntu-latest
    needs: deploy-api

    steps:
      - name: Trigger Render deploy — hedge-n8n
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_N8N }}")
          if [ "$RESPONSE" != "201" ]; then
            echo "n8n deploy hook returned HTTP $RESPONSE"
            exit 1
          fi
          echo "n8n deploy triggered (HTTP $RESPONSE)"
